app_name: "xpto-api"
env: "nprod"
image_repo: "ghcr.io/rodrigo/xpto"
image_tag: "v1.0.0"
replicas: 1
port: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"

enable_proxy: true
db_instance_connection_name: "project:region:nprod-instance"
proxy_resources:
  limits:
    cpu: "100m"
    memory: "128Mi"
  requests:
    cpu: "50m"
    memory: "64Mi"

env_vars:
  LOG_LEVEL: "info"
  CACHE_ENABLED: "true"
  DB_TIMEOUT: "30s"
