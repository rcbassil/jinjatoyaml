apiVersion: apps/v1
kind: Deployment
metadata:
  name: xpto-api
  namespace: default
  labels:
    app: xpto-api
    env: prod
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: xpto-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: xpto-api
        env: prod
        version: v1.0.0
    spec:
      containers:
        - name: main
          image: "ghcr.io/rodrigo/xpto:v1.0.0"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          
          env:
            
            - name: LOG_LEVEL
              value: "warn"
            
            - name: CACHE_ENABLED
              value: "true"
            
            - name: DB_TIMEOUT
              value: "30s"
            
          

        
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.1.0
          args: ["--port=5432", "project:region:prod-instance"]
          securityContext:
            runAsNonRoot: true
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
        
