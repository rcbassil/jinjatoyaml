replicaCount: 3

image:
  repository: ghcr.io/rodrigo/xpto
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

nameOverride: "xpto-api"
fullnameOverride: "xpto-api"

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

podLabels:
  env: prod
  version: "v1.0.0"


env:

  LOG_LEVEL: "warn"
  CACHE_ENABLED: "true"
  DB_TIMEOUT: "30s"


cloudsqlProxy:
  enabled: true
  connectionName: "project:region:prod-instance"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
