replicaCount: 1

image:
  repository: ghcr.io/rodrigo/xpto
  tag: "v1.0.0"
  pullPolicy: IfNotPresent

nameOverride: "xpto-api"
fullnameOverride: "xpto-api"

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

podLabels:
  env: nprod
  version: "v1.0.0"


env:

  LOG_LEVEL: "info"
  CACHE_ENABLED: "true"
  DB_TIMEOUT: "30s"


cloudsqlProxy:
  enabled: true
  connectionName: "project:region:nprod-instance"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
